# 1) dart run tool/square_letterbox_logofull.dart
# 2) flutter pub run flutter_launcher_icons
# Icona tray: quadrato letterboxed da logofull (intero logo, no crop).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logofull_square_for_launcher.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logofull_square_for_launcher.png
  adaptive_icon_foreground_inset: 26
  web:
    generate: true
    image_path: assets/logofull_square_for_launcher.png
    background_color: "#ffffff"
    theme_color: "#38b6ff"

# Splash: logo intero (scaleAspectFit / contain). Android 12+: values-v31 usa @drawable/launch_background
# (non l’icona splash circolare) — se rigeneri lo splash, reimposta quel riferimento negli styles v31.
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logofull.png
  android_gravity: center
  ios_content_mode: scaleAspectFit
  web_image_mode: contain
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
